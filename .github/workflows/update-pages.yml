name: Auto-Update DorkLib GitHub Pages

on:
  schedule:
    # Runs every 6 hours at 00:00, 06:00, 12:00, 18:00 UTC
    - cron: '0 */6 * * *'
  workflow_dispatch:
    # Can also be triggered manually from the Actions tab at any time

jobs:
  update-pages:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch dorks and rebuild index.html
        env:
          REPLIT_API_URL: ${{ secrets.REPLIT_API_URL }}
        run: node scripts/build-pages.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: auto-update dork library $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
