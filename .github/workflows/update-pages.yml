name: Auto-Update DorkLib GitHub Pages

on:
  schedule:
    # Runs every 6 hours — 00:00, 06:00, 12:00, 18:00 UTC
    - cron: '0 */6 * * *'
  workflow_dispatch:
    # Trigger manually anytime from the Actions tab

jobs:
  update-pages:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch new dorks from GitHub security repos
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/fetch-github-dorks.js

      - name: Fetch new dorks from security RSS feeds
        run: node scripts/fetch-rss-dorks.js

      - name: Rebuild index.html from data/dorks.json
        run: node scripts/build-pages.js

      - name: Commit and push if anything changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/dorks.json index.html
          if git diff --staged --quiet; then
            echo "No changes — skipping commit."
          else
            DORK_COUNT=$(node -e "const d=require('./data/dorks.json');console.log(d.total)")
            git commit -m "chore: auto-update — ${DORK_COUNT} dorks as of $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
