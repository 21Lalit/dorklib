<style>
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{

  font-family:'DM Sans',sans-serif;
  color:#b8c8d8;
  overflow-x:hidden;
}
.orb{
  position:fixed;border-radius:50%;
  filter:blur(100px);pointer-events:none;opacity:0.12;z-index:0;
}
nav{
  position:sticky;top:0;z-index:50;
  border-bottom:1px solid rgba(255,255,255,0.06);
  background:rgba(8,14,24,0.85);
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  padding:0 40px;
  display:flex;align-items:center;justify-content:space-between;
  height:54px;
}
.logo{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:#ddeaf4;letter-spacing:-0.02em;text-decoration:none}
.logo em{font-style:italic;font-weight:400;color:#60c890}
.nav-stat{font-size:11px;color:#2a4050;border:1px solid rgba(255,255,255,0.05);border-radius:12px;padding:3px 12px}

.main{position:relative;z-index:1;max-width:1140px;margin:0 auto;padding:56px 40px 100px}
.hero{display:flex;align-items:flex-end;justify-content:space-between;gap:40px;margin-bottom:48px;flex-wrap:wrap}
.eyebrow{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:#2a4050;margin-bottom:20px;display:flex;align-items:center;gap:10px}
.eyebrow::before{content:'';display:inline-block;width:24px;height:1px;background:#2a4050}
h1{font-family:'Playfair Display',serif;font-size:56px;font-weight:700;line-height:1.08;letter-spacing:-0.03em;color:#ddeaf4}
h1 em{font-style:italic;font-weight:400;color:#5a7890}
.search-wrap{position:relative;min-width:300px;flex:0 0 320px}
.search-wrap input{
  width:100%;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.09);
  border-radius:10px;
  padding:13px 16px 13px 44px;
  font-size:14px;color:#c0d0e0;
  font-family:'DM Sans',sans-serif;
}
.search-wrap input:focus{outline:none;border-color:rgba(255,255,255,0.16)}
.search-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:#2a4050;pointer-events:none}
.clear-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:#3a5060;cursor:pointer;font-size:18px;line-height:1;display:none}
.pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:48px}
.pill{
  border:1px solid rgba(255,255,255,0.07);border-radius:100px;
  background:rgba(255,255,255,0.03);font-size:12px;padding:6px 16px;
  cursor:pointer;transition:all 0.18s;color:#4a6880;
  font-family:'DM Sans',sans-serif;white-space:nowrap;
  display:inline-flex;align-items:center;gap:6px;
}
.pill:hover{border-color:rgba(255,255,255,0.14);color:#90a8bc}
.pill.active{background:rgba(255,255,255,0.07);border-color:rgba(255,255,255,0.18);color:#ddeaf4}
.section-header{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.section-label{font-size:10px;letter-spacing:0.16em;text-transform:uppercase}
.section-line{flex:1;height:1px}
.section-count{font-size:11px;color:#2a3a48}
.feat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px;margin-bottom:48px}
.feat-card{
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.07);
  border-radius:14px;padding:28px 28px 22px;
  cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden;
}
.feat-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(224,96,96,0.4),transparent);
}
.feat-card:hover{background:rgba(255,255,255,0.05);border-color:rgba(255,255,255,0.12);transform:translateY(-2px)}
.feat-card.active{background:rgba(255,255,255,0.05)}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.card-icon{font-size:22px;line-height:1}
.diff-badge{font-size:10px;font-weight:600;letter-spacing:0.08em;padding:3px 10px;border-radius:20px}
.card-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:#ddeaf4;line-height:1.3;margin-bottom:8px}

.card-desc{font-size:13px;color:#4a6880;line-height:1.7}
.list-container{border-radius:12px;border:1px solid rgba(255,255,255,0.06);overflow:hidden}
.dork-row{border-bottom:1px solid rgba(255,255,255,0.05);cursor:pointer;transition:background 0.15s}
.dork-row:last-child{border-bottom:none}
.dork-row:hover{background:rgba(255,255,255,0.025)}
.dork-row.open{background:rgba(255,255,255,0.03)}
.row-main{display:grid;grid-template-columns:32px 1fr 140px 130px 20px;gap:16px;padding:15px 20px;align-items:center}
.row-icon{font-size:18px;line-height:1}
.row-title{font-size:14px;color:#b0c0d0;font-weight:400;margin-bottom:3px}
.dork-row.open .row-title{color:#ddeaf4;font-weight:500}
.row-desc{font-size:12px;color:#2a4050;line-height:1.5}
.row-cat{font-size:11px;color:#2a4050}
.row-diff{font-size:11px;font-weight:500}
.row-chevron{color:#2a4050;transition:transform 0.2s;flex-shrink:0}
.dork-row.open .row-chevron{transform:rotate(180deg)}
.row-detail{padding:0 20px 16px 68px}
.query-block{background:rgba(0,0,0,0.28);border:1px solid rgba(255,255,255,0.06);border-radius:8px;padding:12px 14px;display:flex;gap:12px;align-items:flex-start}
.query-code{font-family:'DM Mono',monospace;font-size:12px;color:#60c890;line-height:1.7;flex:1;word-break:break-all}
.copy-btn{border:1px solid rgba(255,255,255,0.10);background:rgba(255,255,255,0.04);color:#4a6880;font-family:'DM Sans',sans-serif;font-size:11px;letter-spacing:0.04em;padding:5px 14px;border-radius:6px;cursor:pointer;transition:all 0.16s;flex-shrink:0;white-space:nowrap}
.copy-btn:hover{border-color:rgba(255,255,255,0.2);color:#90a8bc}
.copy-btn.ok{border-color:#5cc87c!important;color:#5cc87c!important;background:rgba(92,200,124,0.08)!important}
.feat-query{background:rgba(0,0,0,0.28);border:1px solid rgba(255,255,255,0.06);border-radius:8px;padding:12px 14px;margin:14px 0 10px;display:flex;gap:12px;align-items:flex-start}
.empty{text-align:center;padding:80px 0;font-size:13px;color:#2a4050}
@media(max-width:680px){
  nav{padding:0 20px}
  .main{padding:40px 20px 80px}
  h1{font-size:38px}
  .hero{flex-direction:column;align-items:flex-start}
  .search-wrap{width:100%;min-width:unset;flex:unset}
  .row-main{grid-template-columns:28px 1fr 20px;gap:10px}
  .row-cat,.row-diff{display:none}
  .row-detail{padding:0 12px 14px 48px}
}

":"site:{domain} (inurl:staging | inurl:dev | inurl:test | inurl:uat)","diff":"BEGINNER","cat":"Miscellaneous Dorks","desc":"Identifies development, staging, and UAT environments that may have weaker security controls.","intent":"RECONNAISSANCE"},{"id":21,"title":"GraphQL Endpoint Discovery","query":"site:{domain} inurl:graphql | inurl:graphiql","diff":"INTERMEDIATE","cat":"Miscellaneous Dorks","desc":"Locates exposed GraphQL endpoints and interactive GraphiQL explorers.","intent":"RECONNAISSANCE"},{"id":20,"title":"WordPress Login Page Discovery","query":"site:{domain} inurl:wp-login.php","diff":"BEGINNER","cat":"Miscellaneous Dorks","desc":"Finds WordPress login and admin interfaces which are common attack targets.","intent":"ADMIN_ACCESS"},{"id":19,"title":"Backup File Discovery","query":"site:{domain} ext:bak OR ext:backup OR ext:old","diff":"BEGINNER","cat":"Miscellaneous Dorks","desc":"Locates backup files left in publicly accessible web directories.","intent":"DATA_EXPOSURE"},{"id":18,"title":"Log File Exposure","query":"site:{domain} ext:log (\"error\" | \"exception\" | \"fatal\")","diff":"BEGINNER","cat":"Miscellaneous Dorks","desc":"Finds exposed application log files that may contain sensitive debugging information.","intent":"DATA_EXPOSURE"},{"id":17,"title":"Swagger API Documentation Exposure","query":"site:{domain} inurl:swagger OR inurl:api-docs","diff":"BEGINNER","cat":"Miscellaneous Dorks","desc":"Finds exposed Swagger/OpenAPI documentation which may reveal undocumented API endpoints.","intent":"RECONNAISSANCE"},{"id":16,"title":"Exposed Admin Panel Discovery","query":"intitle:\"admin panel\" site:{domain}","diff":"BEGINNER","cat":"Web Security","desc":"Discovers exposed administration interfaces on target domains. Use only on authorized systems.","intent":"ADMIN_ACCESS"},{"id":15,"title":"CI/CD Pipeline Exposure","query":"intitle:\"Jenkins\" | intitle:\"GitLab CI\" site:{domain} inurl:login","diff":"ADVANCED","cat":"DevSecOps","desc":"Finds exposed covery","query":"site:{domain} ext:bak OR ext:backup OR ext:old","diff":"BEGINNER","cat":"Web Security","desc":"Locates backup files left in publicly accessible web directories.","intent":"DATA_EXPOSURE"},{"id":6,"title":"Log File Exposure","query":"site:{domain} ext:log (\"error\" | \"exception\" | \"fatal\")","diff":"BEGINNER","cat":"Web Security","desc":"Finds exposed application log files that may contain sensitive debugging information.","intent":"DATA_EXPOSURE"},{"id":5,"title":"Database Interface Exposure","query":"intitle:\"phpMyAdmin\" site:{domain} | inurl:phpmyadmin site:{domain}","diff":"BEGINNER","cat":"Data Exposure","desc":"Detects exposed web-based database management interfaces.","intent":"VULNERABILITY_DISCOVERY"},{"id":4,"title":"Swagger API Documentation Exposure","query":"site:{domain} inurl:swagger OR inurl:api-docs","diff":"BEGINNER","cat":"Web Security","desc":"Finds exposed Swagger/OpenAPI documentation which may reveal undocumented API endpoints.","intent":"RECONNAISSANCE"},{"id":3,"title":"AWS S3 Bucket Discovery","query":"site:{domain} \"s3.amazonaws.com\" | site:s3.amazonaws.com {organization}","diff":"INTERMEDIATE","cat":"Cloud Security","desc":"Locates publicly accessible S3 buckets associated with a target organization.","intent":"DATA_EXPOSURE"},{"id":2,"title":"Environment File Exposure","query":"site:{domain} ext:env \"DB_PASSWORD\" OR \"SECRET_KEY\"","diff":"INTERMEDIATE","cat":"DevSecOps","desc":"Finds accidentally exposed .env configuration files containing sensitive credentials.","intent":"CREDENTIAL_HARVESTING"},{"id":1,"title":"Exposed Admin Panel Discovery","query":"intitle:\"admin panel\" site:{domain}","diff":"BEGINNER","cat":"Web Security","desc":"Discovers exposed administration interfaces on target domains. Use only on authorized systems.","intent":"ADMIN_ACCESS"}];
const CATS = ["All","AI Security","Cloud Security","Compliance and Audit","Data Exposure","DevSecOps","Digital Forensics","Identity and Access","IoT and OT Security","Learning and Labs","Miscellaneous Dorks","Mobile Security","Network Security","Threat Intelligence","Vulnerability Research","Web Security"];
const ICONS = {"All":"✦","Web Security":"🌐","Cloud Security":"☁️","Network Security":"🔌","DevSecOps":"⚙️","OSINT":"🔍","Red Team":"🗡️","Blue Team":"🛡️","AI Security":"🤖","Vulnerability Research":"🔬","Compliance and Audit":"📋","Identity and Access":"🔑","IoT and OT Security":"🔧","Data Exposure":"💾","Threat Intelligence":"🎯","Digital Forensics":"🔎","Mobile Security":"📱","Learning and Labs":"📚","Miscellaneous Dorks":"🗂️"};

const DIFF = {
  BEGINNER:     {label:"Beginner",      color:"#5cc87c", bg:"rgba(92,200,124,0.10)"},
  INTERMEDIATE: {label:"Intermediate",  color:"#d4a440", bg:"rgba(212,164,64,0.10)"},
  ADVANCED:     {label:"Advanced",      color:"#e06060", bg:"rgba(224,96,96,0.10)"},
  EXPERT:       {label:"Expert",        color:"#c87ce0", bg:"rgba(200,124,224,0.10)"},
};

// High-severity dorks (ADVANCED + certain intent types)
const HIGH_SEVERITY = new Set([
  "CREDENTIAL_HARVESTING","DATA_EXPOSURE","ADMIN_ACCESS","VULNERABILITY_DISCOVERY"
]);

let activeCat = "All";
let activeSearch = "";
let openId = null;

function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

function dc(diff){ return DIFF[diff] || DIFF.BEGINNER; }

function isFeatured(d){ return d.diff === "ADVANCED" && HIGH_SEVERITY.has(d.intent); }

function filtered(){
  const q = activeSearch.toLowerCase();
  return DORKS.filter(d =>
    (activeCat === "All" || d.cat === activeCat) &&
    (!q || d.title.toLowerCase().includes(q) || d.query.toLowerCase().includes(q) || d.desc.toLowerCase().includes(q))
  );
}

// --- Pills ---
function renderPills(){
  const container = document.getElementById("pills");
  container.innerHTML = CATS.map(c => {
    const icon = ICONS[c] || "";
    return `<button class="pill${c===activeCat?" active":""}" onclick="setCat('${esc(c)}')">${icon ? icon+" " : ""}${esc(c)}</button>`;
  }).join("");
}

function setCat(c){
  activeCat = c;
  renderPills();
  renderDorks();
}

// --- Search ---
document.getElementById("search").addEventListener("input", function(){
  activeSearch = this.value;
  document.getElementById("clear-btn").style.display = this.value ? "block" : "none";
  renderDorks();
});

function clearSearch(){
  activeSearch = "";
  document.getElementById("search").value = "";
  document.getElementById("clear-btn").style.display = "none";
  renderDorks();
}

// --- Toggle expand ---
function toggleRow(id){
  openId = openId === id ? null : id;
  renderDorks();
}

// --- Copy ---
function copyQuery(id, query){
  navigator.clipboard.writeText(query).catch(()=>{
    const ta = document.createElement("textarea");
    ta.value = query; document.body.appendChild(ta);
    ta.select(); document.execCommand("copy"); document.body.removeChild(ta);
  });
  const btn = document.querySelector(`[data-copy="${id}"]`);
  if(btn){ btn.textContent = "✓ Copied"; btn.classList.add("ok"); setTimeout(()=>{ btn.textContent="Copy"; btn.classList.remove("ok"); },1600); }
}

// --- Render ---
function renderDorks(){
  const list = filtered();
  const feat = list.filter(isFeatured);
  const rest = list.filter(d => !isFeatured(d));

  const empty = document.getElementById("empty");
  const featSec = document.getElementById("feat-section");
  const listSec = document.getElementById("list-section");

  if(list.length === 0){
    empty.style.display = "block";
    featSec.style.display = "none";
    listSec.style.display = "none";
    return;
  }
  empty.style.display = "none";

  // Featured
  if(feat.length > 0){
    featSec.style.display = "block";
    document.getElementById("feat-grid").innerHTML = feat.map(d => {
      const cfg = dc(d.diff);
      const isOpen = openId === d.id;
      const descShort = d.desc.length > 160 ? d.desc.slice(0,160)+"…" : d.desc;
      return `<div class="feat-card${isOpen?" active":""}" onclick="toggleRow(${d.id})">
        <div class="card-top">
          <span class="card-icon">${ICONS[d.cat]||""}</span>
          <span class="diff-badge" style="color:${cfg.color};background:${cfg.bg}">${cfg.label}</span>
        </div>
        <div class="card-title">${esc(d.title)}</div>
        <div class="card-cat">${esc(d.cat)}</div>
        <div class="card-desc">${esc(descShort)}</div>
        ${isOpen ? `<div class="feat-query" onclick="event.stopPropagation()">
          <code class="query-code">${esc(d.query)}</code>
          <button class="copy-btn" data-copy="${d.id}" onclick="copyQuery(${d.id},${JSON.stringify(d.query)})">Copy</button>
        </div>` : ""}
      </div>`;
    }).join("");
  } else {
    featSec.style.display = "none";
  }

  // List
  if(rest.length > 0){
    listSec.style.display = "block";
    document.getElementById("list-count").textContent = rest.length + " results";
    document.getElementById("list-container").innerHTML = rest.map((d,i) => {
      const cfg = dc(d.diff);
      const isOpen = openId === d.id;
      const descShort = d.desc.length > 90 ? d.desc.slice(0,90)+"…" : d.desc;
      return `<div class="dork-row${isOpen?" open":""}" onclick="toggleRow(${d.id})" ${i===0?"":"style='border-top:none'"}>
        <div class="row-main">
          <span class="row-icon">${ICONS[d.cat]||""}</span>
          <div>
            <div class="row-title">${esc(d.title)}</div>
            ${descShort ? `<div class="row-desc">${esc(descShort)}</div>` : ""}
          </div>
          <span class="row-cat">${esc(d.cat)}</span>
          <span class="row-diff" style="color:${cfg.color}">${cfg.label}</span>
          <svg class="row-chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
        </div>
        ${isOpen ? `<div class="row-detail" onclick="event.stopPropagation()">
          <div class="query-block">
            <code class="query-code">${esc(d.query)}</code>
            <button class="copy-btn" data-copy="${d.id}" onclick="copyQuery(${d.id},${JSON.stringify(d.query)})">Copy</button>
          </div>
        </div>` : ""}
      </div>`;
    }).join("");
  } else {
    listSec.style.display = rest.length > 0 ? "block" : "none";
  }
}

renderPills();
renderDorks();
</script>
